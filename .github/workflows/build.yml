name: Build Mod

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Java 21 — wajib untuk 1.20.x dan 1.21.x
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Pin Gradle yang dipakai untuk men-generate wrapper ke 8.14.
      # Tanpa ini, gradle/actions/setup-gradle akan memasang Gradle terbaru
      # di runner (misal 9.5.1), dan command "gradle wrapper" di bawah akan
      # memakai Gradle global itu untuk meng-evaluasi build.gradle terlebih
      # dahulu (root project, bukan sub-project, jadi --configure-on-demand
      # tidak membantu) — sehingga plugin Loom 1.9.2 gagal di-resolve oleh
      # Gradle versi tersebut meski Loom mengklaim mendukung Gradle 9.0.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'

      # Generate wrapper sekarang dijalankan oleh Gradle 8.14 (sesuai pin di atas),
      # jadi resolusi plugin Loom 1.9.2 terjadi dengan Gradle versi yang sama
      # dengan yang akan dipakai gradlew untuk build sesungguhnya.
      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.14

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build mod
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtoggle-jar
          path: build/libs/*.jar
