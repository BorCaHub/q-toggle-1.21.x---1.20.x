name: Build Q Toggle All Versions

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - mc: "1.20.1"
            fabric: "0.92.2+1.20.1"
            loader: "0.14.21"
            loom:   "1.4.2"
            java:   "17"
            gradle: "8.8"

          - mc: "1.20.2"
            fabric: "0.91.6+1.20.2"
            loader: "0.15.1"
            loom:   "1.4.2"
            java:   "21"
            gradle: "8.8"

          - mc: "1.20.4"
            fabric: "0.97.3+1.20.4"
            loader: "0.15.6"
            loom:   "1.6.12"
            java:   "21"
            gradle: "8.8"

          - mc: "1.20.6"
            fabric: "0.100.8+1.20.6"
            loader: "0.15.10"
            loom:   "1.6.12"
            java:   "21"
            gradle: "8.8"

          - mc: "1.21"
            fabric: "0.100.1+1.21"
            loader: "0.15.11"
            loom:   "1.7.4"
            java:   "21"
            gradle: "8.8"

          - mc: "1.21.1"
            fabric: "0.116.5+1.21.1"
            loader: "0.16.10"
            loom:   "1.9.2"
            java:   "21"
            gradle: "8.11"

          - mc: "1.21.4"
            fabric: "0.114.0+1.21.4"
            loader: "0.16.10"
            loom:   "1.9.2"
            java:   "21"
            gradle: "8.11"

          - mc: "1.21.5"
            fabric: "0.128.1+1.21.5"
            loader: "0.16.10"
            loom:   "1.10.3"
            java:   "21"
            gradle: "8.12"

          - mc: "1.21.6"
            fabric: "0.128.1+1.21.6"
            loader: "0.16.14"
            loom:   "1.10.3"
            java:   "21"
            gradle: "8.12"

          - mc: "1.21.7"
            fabric: "0.128.2+1.21.7"
            loader: "0.16.14"
            loom:   "1.10.3"
            java:   "21"
            gradle: "8.12"

          - mc: "1.21.8"
            fabric: "0.136.1+1.21.8"
            loader: "0.16.14"
            loom:   "1.10.3"
            java:   "21"
            gradle: "8.12"

          - mc: "1.21.9"
            fabric: "0.134.1+1.21.9"
            loader: "0.17.2"
            loom:   "1.11.7"
            java:   "21"
            gradle: "8.14"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ matrix.gradle }}

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version ${{ matrix.gradle }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Override Gradle wrapper version
        run: |
          sed -i "s|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-${{ matrix.gradle }}-bin.zip|" \
            gradle/wrapper/gradle-wrapper.properties

      - name: Override gradle.properties
        run: |
          sed -i "s/^minecraft_version=.*/minecraft_version=${{ matrix.mc }}/"   gradle.properties
          sed -i "s/^fabric_version=.*/fabric_version=${{ matrix.fabric }}/"     gradle.properties
          sed -i "s/^loader_version=.*/loader_version=${{ matrix.loader }}/"     gradle.properties
          sed -i "s/^loom_version=.*/loom_version=${{ matrix.loom }}/"           gradle.properties

      - name: Set Java release target for 1.20.1
        if: matrix.mc == '1.20.1'
        run: sed -i "s/it.options.release = 21/it.options.release = 17/" build.gradle

      - name: Clean Gradle cache
        run: |
          rm -rf ~/.gradle/caches/modules-2/files-2.1/net.fabricmc/
          rm -rf .gradle/loom-cache/

      - name: Build mod
        run: ./gradlew clean build --info

      - name: Rename jar
        run: |
          mkdir -p staging
          for f in build/libs/*.jar; do
            [[ "$f" == *-sources* ]] && continue
            cp "$f" "staging/qtoggle-${{ matrix.mc }}-1.0.0.jar"
          done

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: jar-${{ matrix.mc }}
          path: staging/*.jar

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download semua jar
        uses: actions/download-artifact@v4
        with:
          pattern: jar-*
          merge-multiple: true
          path: all-jars

      - name: Buat ZIP
        run: |
          cd all-jars
          zip -j "../Q Toggle 1.20.1-1.21.9 (1.0.0).zip" *.jar
          cd ..
          ls -lh "Q Toggle 1.20.1-1.21.9 (1.0.0).zip"

      - name: Upload ZIP final
        uses: actions/upload-artifact@v4
        with:
          name: "Q Toggle 1.20.1-1.21.9 (1.0.0)"
          path: "Q Toggle 1.20.1-1.21.9 (1.0.0).zip"
